<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR Maxx | Ordem de Servico</title>
    <link rel="stylesheet" href="./style/ordemServico.css">
    <script src="./JS/sideBar.js" defer></script>
    <script src="./JS/ordemServico.js" defer></script>
</head>
<body>
    <side-bar></side-bar>

    <main id="main-content">
        <div class="container">
            <h1>Gerenciamento de Servicos</h1>

            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="inputSearch" placeholder="Pesquisar por nome do cliente" onkeyup="filterTable()">
                </div>
                <button class="btn-new-client" id="btnOpenModal" type="button">
                    + Nova Ordem de Servico
                </button>
            </div>

            <p class="feedback" id="feedback" aria-live="polite"></p>

            <table class="client-table" id="tableClients">
                <thead>
                    <tr>
                        <th>Nº OS</th>
                        <th>Nome Cliente</th>
                        <th>Carro</th>
                        <th>Data de entrada</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <div id="modal-os" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-titulo">Cadastro de Ordem de Servico</h2>
                <span class="close-modal" id="btn-fechar-modal-os">&times;</span>
            </div>

            <form id="form-os">
                <div class="modal-body-os">
                    <h3 class="section-title">DADOS DA OS</h3>

                    <div class="row">
                        <div class="input-group">
                            <label>Nome do cliente *</label>
                            <input type="text" id="os-cliente" placeholder="Ex: Joao Silva">
                        </div>
                        <div class="input-group">
                            <label>Telefone para contato *</label>
                            <input type="text" id="os-telefone" placeholder="(11) 99999-9999">
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Veiculo *</label>
                            <input type="text" id="os-veiculo" placeholder="Toyota Corolla (ABC-1234)">
                        </div>
                        <div class="input-group">
                            <label>Status *</label>
                            <select id="os-status">
                                <option value="">Selecione...</option>
                                <option value="Aguardando Pecas">Aguardando Pecas</option>
                                <option value="Em andamento">Em andamento</option>
                                <option value="Finalizada">Finalizada</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group full">
                        <label>Descricao do reparo *</label>
                        <textarea id="os-descricao" rows="3" placeholder="Descreva o servico a ser realizado..."></textarea>
                    </div>

                    <div class="input-group full">
                        <label>Lista de pecas</label>
                        <textarea id="os-pecas" rows="3" placeholder="Ex: Filtro de oleo, pastilha de freio..."></textarea>
                    </div>

                    <div class="input-group full">
                        <label>Observacoes</label>
                        <textarea id="os-obs" rows="2" placeholder="Informacoes adicionais..."></textarea>
                    </div>
                </div>
            </form>

            <div class="modal-footer">
                <button type="button" class="btn-cancelar" id="btn-cancelar-os">Cancelar</button>
                <button type="submit" form="form-os" class="btn-salvar" id="btn-salvar-os">Cadastrar OS</button>
            </div>
        </div>
    </div>
</body>
</html>
