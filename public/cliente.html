<!DOCTYPE html>

            <h1>Gerenciamento de Clientes e Veículos</h1>

                        <th>Telefone</th>

                <tbody>

                            <button class="btn-detalhes">Ver mais</button>
                        </td>
                    </tr>
                    <tr>
                        <td>Ana Beatriz</td>
                        <td>ana.b@email.com</td>

                        <td>Honda Civic (XYZ-9876)</td>

                            <button class="btn-detalhes">Ver mais</button>

</body>
</html>
