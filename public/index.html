<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RR Maxx | Login</title>
    <link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <main class="page-shell">
        <button class="back-button" type="button" aria-label="Voltar" data-target="history">
            <span></span>
        </button>

        <section class="auth-wrapper">
            <header class="brand-block">
                <img class="brand-logo" src="./assets/Logo.png" alt="Logo RR Maxx">
            </header>

            <article class="auth-card">
                <section class="panel is-active">
                    <h1>Login</h1>
                    <form id="login-form" novalidate>
                        <label for="login-email">E-mail:</label>
                        <input id="login-email" name="email" type="email" required>

                        <label for="login-password">Senha:</label>
                        <input id="login-password" name="password" type="password" required>

                        <button class="primary-button" type="submit">Entrar</button>
                    </form>
                    <p class="helper-link">
                        Ainda nao tem conta?
                        <a href="./cadastro.html">Cadastrar</a>
                    </p>
                </section>

                <p class="feedback" id="feedback" aria-live="polite"></p>
            </article>
        </section>
    </main>

    <script src="./JS/userStore.js"></script>
    <script src="./JS/server.js"></script>
</body>
</html>
